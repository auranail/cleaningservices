<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join as a Cleaner | Let's Cleaning</title>
    <meta
      name="description"
      content="Apply to join Let's Cleaning as a cleaner and share your service area, experience, and availability."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://letscleaning.com/join-cleaner.html" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="page-shell nav-shell">
        <a class="brand brand-mark" href="index.html" aria-label="Let's Cleaning home">
          <img src="L Logo.png" alt="Let's Cleaning logo" class="brand-logo" />
          <span class="brand-text">Let's Cleaning</span>
        </a>
        <nav class="site-nav">
          <a href="services.html">Services</a>
          <a href="get-a-quote.html">Get a Quote</a>
          <a href="join-cleaner.html">Join as a Cleaner</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="page-shell interior-page">
      <section class="page-intro">
        <p class="eyebrow">For Cleaners</p>
        <h1>Apply to join the cleaner network.</h1>
        <p class="lead">
          Independent cleaners and cleaning teams can apply to join Let's Cleaning
          and receive opportunities that match their location and services.
        </p>
      </section>

      <section class="detail-card booking-card">
        <form class="booking-form" action="mailto:hello@letscleaning.com" method="post" enctype="text/plain">
          <label>
            Full Name
            <input type="text" name="Full Name" placeholder="Your name" required />
          </label>
          <label>
            Business Name
            <input type="text" name="Business Name" placeholder="Your business name" />
          </label>
          <label>
            Email
            <input type="email" name="Email" placeholder="you@example.com" required />
          </label>
          <label>
            Phone
            <input type="tel" name="Phone" placeholder="(555) 555-5555" />
          </label>
          <label>
            Service Area
            <input type="text" name="Service Area" placeholder="City, neighborhood, or ZIP codes" />
          </label>
          <label>
            Services Offered
            <input type="text" name="Services Offered" placeholder="House cleaning, office cleaning, turnovers, deep cleaning" />
          </label>
          <label>
            Experience
            <input type="text" name="Experience" placeholder="Years of experience" />
          </label>
          <label>
            Availability
            <input type="text" name="Availability" placeholder="Weekdays, weekends, mornings, afternoons" />
          </label>
          <label>
            Additional Details
            <textarea name="Additional Details" rows="6" placeholder="Tell us about your experience, supplies, team size, and any other useful details."></textarea>
          </label>
          <button class="button primary" type="submit">Apply as a Cleaner</button>
        </form>
      </section>
    </main>
  </body>
</html>
